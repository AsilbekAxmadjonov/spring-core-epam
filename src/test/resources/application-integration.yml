spring:
  datasource:
    url: jdbc:h2:mem:trainingdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

  jms:
    listener:
      auto-startup: true

eureka:
  client:
    enabled: false

app:
  security:
    jwt-secret: mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456