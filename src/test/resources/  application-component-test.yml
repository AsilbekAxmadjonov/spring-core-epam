server:
  port: 0

spring:
  application:
    name: spring-core-epam-component-test

  datasource:
    url: jdbc:h2:mem:componenttestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

  activemq:
    broker-url: vm://localhost?broker.persistent=false
    user: admin
    password: admin

  jms:
    listener:
      auto-startup: false
    pub-sub-domain: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456
    jwt-expiration: 3600000

  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
    allow-credentials: true
    max-age: 3600