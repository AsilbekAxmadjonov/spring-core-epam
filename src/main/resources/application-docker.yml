spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-db:5432/hibernate
    username: postgres
    password: postgres

  activemq:
    broker-url: tcp://activemq:61616
    user: admin
    password: admin

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    hostname: main-service
    prefer-ip-address: false